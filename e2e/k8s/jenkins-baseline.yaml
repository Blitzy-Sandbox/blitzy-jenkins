---
# Jenkins baseline instance — standard Jelly-rendered UI.
# Used as the reference for visual regression comparison.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-home-baseline
  namespace: jenkins-e2e
  labels:
    app: jenkins-baseline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-baseline
  namespace: jenkins-e2e
  labels:
    app: jenkins-baseline
    instance-type: baseline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-baseline
  template:
    metadata:
      labels:
        app: jenkins-baseline
        instance-type: baseline
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        # Copy seed data from shared init volume if available
        - name: init-home
          image: jenkins/jenkins:lts-jdk21
          command:
            - /bin/sh
            - -c
            - |
              if [ ! -f /var/jenkins_home/config.xml ]; then
                echo "Fresh JENKINS_HOME — init-job will populate it."
              fi
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts-jdk21
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: agent
              containerPort: 50000
              protocol: TCP
          env:
            - name: JENKINS_OPTS
              value: "--prefix=/jenkins"
            - name: JAVA_OPTS
              value: >-
                -Djenkins.install.runSetupWizard=false
                -Dhudson.security.csrf.GlobalCrumbIssuerConfiguration.DISABLE_CSRF_PROTECTION=true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /jenkins/login
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /jenkins/login
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-home-baseline
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-baseline
  namespace: jenkins-e2e
  labels:
    app: jenkins-baseline
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: jenkins-baseline
